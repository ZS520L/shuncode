syntax = "proto3";

package shuncode;

import "shuncode/common.proto";

option go_package = "github.com/shuncode/grpc-go/shuncode";
option java_multiple_files = true;
option java_package = "bot.shuncode.proto";

service DictationService {
  rpc startRecording(EmptyRequest) returns (RecordingResult);
  rpc stopRecording(EmptyRequest) returns (RecordedAudio);
  rpc cancelRecording(EmptyRequest) returns (RecordingResult);
  rpc getRecordingStatus(EmptyRequest) returns (RecordingStatus);
  rpc transcribeAudio(TranscribeAudioRequest) returns (Transcription);
  rpc listAudioDevices(EmptyRequest) returns (AudioDeviceList);
}

message TranscribeAudioRequest {
  string audio_base64 = 2;
  string language = 3;
}

message RecordingResult {
  bool success = 1;
  string error = 2;
}

message RecordedAudio {
  bool success = 1;
  string audio_base64 = 2;
  string error = 3;
}

message RecordingStatus {
  bool is_recording = 1;
  double duration_seconds = 2;
  string error = 3;
}

message Transcription {
  string text = 1;
  string error = 2;
}

message AudioDeviceInfo {
  string id = 1;
  string name = 2;
  bool is_default = 3;
}

message AudioDeviceList {
  repeated AudioDeviceInfo devices = 1;
  string error = 2;
}
